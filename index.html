<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Vault · E2E</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c-bg:#f5f2ee;--c-bg2:#ede9e3;--c-bg3:#e0dbd2;
  --c-surface:#ffffff;--c-surfaceB:#f9f7f4;
  --c-border:rgba(0,0,0,0.08);--c-border2:rgba(0,0,0,0.15);
  --c-text:#1a1714;--c-text2:#6b6459;--c-text3:#a89f95;
  --c-bubble-me:#1a1714;--c-bubble-me-txt:#f5f2ee;
  --c-bubble-in:#ffffff;--c-bubble-in-txt:#1a1714;
  --c-accent:#c8401a;--c-green:#2d7a4f;--c-red:#c0372a;--c-warn:#b55a00;
  --c-shadow:rgba(0,0,0,0.06);--c-shadow2:rgba(0,0,0,0.14);
  --r:12px;--r2:18px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --t:.18s ease;
}
[data-dark]{
  --c-bg:#111010;--c-bg2:#181614;--c-bg3:#1f1d1b;
  --c-surface:#201e1c;--c-surfaceB:#252220;
  --c-border:rgba(255,255,255,0.07);--c-border2:rgba(255,255,255,0.14);
  --c-text:#f0ece6;--c-text2:#857d74;--c-text3:#4d4640;
  --c-bubble-me:#e8e0d6;--c-bubble-me-txt:#111010;
  --c-bubble-in:#2c2926;--c-bubble-in-txt:#f0ece6;
  --c-shadow:rgba(0,0,0,0.3);--c-shadow2:rgba(0,0,0,0.5);
}
html,body{height:100%}
body{font-family:var(--sans);background:var(--c-bg);color:var(--c-text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background var(--t),color var(--t)}

/* ─── lock ─────────────────────────────────────────────── */
#lockScreen{width:100%;max-width:340px;padding:28px 20px;animation:fadeUp .3s ease}
.ll{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.ll-icon{width:38px;height:38px;border-radius:10px;background:var(--c-text);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-icon svg{width:18px;height:18px;stroke:var(--c-bg);stroke-width:1.8;fill:none}
.ll-name{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.04em}
.ll-sub{font-size:9px;color:var(--c-text3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.lbl{font-size:10px;color:var(--c-text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.iw{position:relative;margin-bottom:4px}
.iw input{width:100%;padding:12px 42px 12px 13px;background:var(--c-surface);
  border:1px solid var(--c-border2);border-radius:var(--r);
  font-family:var(--mono);font-size:13.5px;color:var(--c-text);
  outline:none;transition:border-color var(--t),box-shadow var(--t);letter-spacing:.04em}
.iw input:focus{border-color:var(--c-accent);box-shadow:0 0 0 3px rgba(200,64,26,.1)}
.iw input::placeholder{color:var(--c-text3)}
.eye-btn{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--c-text3);padding:4px;transition:color var(--t)}
.eye-btn:hover{color:var(--c-text)}
.eye-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;display:block}
.sbar{height:2px;border-radius:1px;background:var(--c-border2);margin-bottom:14px;overflow:hidden}
.sfill{height:100%;border-radius:1px;width:0;transition:width .3s,background .3s}
.hint{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--c-text3);margin-bottom:18px;line-height:1.5}
.hint svg{width:11px;height:11px;stroke:currentColor;fill:none;flex-shrink:0}
.lbtn{width:100%;padding:12px;background:var(--c-text);color:var(--c-bg);border:none;
  border-radius:var(--r);font-family:var(--mono);font-size:12px;font-weight:500;
  letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity var(--t),transform .1s}
.lbtn:hover{opacity:.82}
.lbtn:active{transform:scale(.98)}
.lbtn:disabled{opacity:.35;cursor:default}
.lbtn svg{width:13px;height:13px;stroke:var(--c-bg);fill:none;stroke-width:2}
.lerr{margin-top:9px;font-size:11px;color:var(--c-red);text-align:center;min-height:15px;font-family:var(--mono)}

/* ─── app ──────────────────────────────────────────────── */
#app{display:none;width:100%;max-width:640px;height:100vh;height:100dvh;
  flex-direction:column;background:var(--c-surface);
  border-left:1px solid var(--c-border);border-right:1px solid var(--c-border)}
#app.vis{display:flex;animation:fadeIn .2s ease}

/* topbar */
.tb{flex-shrink:0;display:flex;align-items:center;gap:9px;
  padding:11px 14px;background:var(--c-surface);
  border-bottom:1px solid var(--c-border);z-index:10;position:relative}
.tb-av{width:33px;height:33px;border-radius:50%;background:var(--c-text);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-av svg{width:14px;height:14px;stroke:var(--c-bg);stroke-width:2;fill:none}
.tb-info{flex:1;min-width:0}
.tb-name{font-family:var(--mono);font-size:12.5px;font-weight:500;letter-spacing:.03em}
.tb-st{font-size:10px;color:var(--c-text3);display:flex;align-items:center;gap:4px;margin-top:1px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--c-text3);flex-shrink:0;transition:background var(--t)}
.sdot.on{background:var(--c-green)}
.sdot.err{background:var(--c-red)}
.sdot.spn{background:none;border:1.5px solid var(--c-warn);border-top-color:transparent;animation:spin .7s linear infinite}
.enc-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;
  background:rgba(45,122,79,.08);border:1px solid rgba(45,122,79,.18);
  font-size:9px;letter-spacing:.07em;color:var(--c-green);font-family:var(--mono);text-transform:uppercase}
.enc-pill svg{width:9px;height:9px;stroke:var(--c-green);fill:none;stroke-width:2.2}
.tb-acts{display:flex;align-items:center;gap:2px}
.ibtn{width:31px;height:31px;border-radius:8px;background:none;border:none;cursor:pointer;
  color:var(--c-text2);display:flex;align-items:center;justify-content:center;
  transition:background var(--t),color var(--t)}
.ibtn:hover{background:var(--c-bg2);color:var(--c-text)}
.ibtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.rf-wrap{position:relative}
.nbadge{position:absolute;top:-2px;right:-2px;width:13px;height:13px;border-radius:50%;
  background:var(--c-accent);color:#fff;font-size:8px;font-weight:500;
  display:flex;align-items:center;justify-content:center;animation:popIn .2s ease}
.nbadge.hid{display:none}

/* messages */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 6px;
  display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--c-border2);border-radius:2px}

.divider{display:flex;align-items:center;gap:8px;margin:10px 0 5px;
  font-size:9px;color:var(--c-text3);letter-spacing:.07em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--c-border)}

.brow{display:flex;flex-direction:column;align-items:flex-start;max-width:78%;
  animation:slideUp .18s ease both}
.brow.me{align-items:flex-end;align-self:flex-end}

.bub{padding:8px 12px;border-radius:var(--r2);font-size:13px;line-height:1.62;
  word-break:break-word;white-space:pre-wrap;position:relative;cursor:default}
.bub.in{background:var(--c-bubble-in);color:var(--c-bubble-in-txt);
  border-bottom-left-radius:4px;border:1px solid var(--c-border)}
.bub.out{background:var(--c-bubble-me);color:var(--c-bubble-me-txt);border-bottom-right-radius:4px}
.bub.fail{background:rgba(192,55,42,.08);border:1px solid rgba(192,55,42,.2);
  color:var(--c-red);font-family:var(--mono);font-size:11px;font-style:italic}

.bub-acts{position:absolute;top:-30px;right:0;display:flex;gap:2px;
  background:var(--c-surface);border:1px solid var(--c-border2);border-radius:8px;padding:2px;
  box-shadow:0 4px 14px var(--c-shadow2);opacity:0;pointer-events:none;transition:opacity .12s;z-index:20}
.bub:hover .bub-acts{opacity:1;pointer-events:auto}
.bact{width:24px;height:24px;border-radius:5px;background:none;border:none;cursor:pointer;
  color:var(--c-text2);display:flex;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
.bact:hover{background:var(--c-bg2);color:var(--c-text)}
.bact.del:hover{background:rgba(192,55,42,.1);color:var(--c-red)}
.bact svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}

.bmeta{display:flex;align-items:center;gap:4px;margin-top:2px;font-size:9.5px;color:var(--c-text3)}
.brow.me .bmeta{flex-direction:row-reverse}
.chk svg{width:11px;height:11px;stroke:var(--c-green);fill:none;stroke-width:2.5}
.sending-lbl{opacity:.5;font-size:9px;font-family:var(--mono)}

/* skeleton */
.skel{border-radius:var(--r2);height:36px;
  background:linear-gradient(90deg,var(--c-bg2) 25%,var(--c-bg3) 50%,var(--c-bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.1s infinite}
.skel.s{width:100px}.skel.m{width:190px}.skel.l{width:270px}.skel.me{align-self:flex-end}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:9px;color:var(--c-text3);text-align:center;padding:32px}
.empty svg{width:34px;height:34px;stroke:currentColor;fill:none;stroke-width:1.2;opacity:.4}
.empty h3{font-size:12px;font-weight:500;color:var(--c-text2)}
.empty p{font-size:11px;line-height:1.6;max-width:210px}

/* new msg bar */
.nmbar{position:absolute;bottom:68px;left:50%;transform:translateX(-50%) translateY(6px);
  background:var(--c-text);color:var(--c-bg);border-radius:20px;padding:6px 15px;
  font-size:11px;font-family:var(--mono);cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;white-space:nowrap;z-index:30;
  display:flex;align-items:center;gap:5px}
.nmbar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.nmbar svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}

/* compose */
.cmp{flex-shrink:0;padding:9px 11px;background:var(--c-surface);border-top:1px solid var(--c-border)}
.cmp-row{display:flex;align-items:flex-end;gap:7px}
.cbox{flex:1;background:var(--c-surfaceB);border:1px solid var(--c-border2);border-radius:var(--r2);
  padding:9px 13px;transition:border-color var(--t),box-shadow var(--t);
  display:flex;flex-direction:column;min-height:40px;max-height:150px;overflow:hidden}
.cbox:focus-within{border-color:var(--c-accent);box-shadow:0 0 0 3px rgba(200,64,26,.08)}
.cbox textarea{background:none;border:none;outline:none;font-family:var(--sans);
  font-size:13px;color:var(--c-text);line-height:1.55;resize:none;overflow-y:auto;
  width:100%;min-height:20px;max-height:115px}
.cbox textarea::placeholder{color:var(--c-text3)}
.cbox textarea::-webkit-scrollbar{width:2px}
.chint{font-size:9px;color:var(--c-text3);margin-top:3px;letter-spacing:.03em}
.csend{width:40px;height:40px;border-radius:50%;background:var(--c-text);color:var(--c-bg);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:opacity var(--t),transform .1s}
.csend:hover{opacity:.8}.csend:active{transform:scale(.9)}.csend:disabled{opacity:.3;cursor:default}
.csend svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2}
.csend.sending svg{animation:spin .6s linear infinite}

/* toast */
.twrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1000;pointer-events:none}
.tt{background:var(--c-text);color:var(--c-bg);border-radius:9px;padding:7px 15px;
  font-size:11px;font-family:var(--mono);box-shadow:0 4px 16px var(--c-shadow2);
  animation:tIn .18s ease;pointer-events:none;max-width:280px;text-align:center}
.tt.out{animation:tOut .18s ease forwards}
.tt.err{background:var(--c-red)}

/* ctx menu */
.ctx{position:fixed;z-index:200;background:var(--c-surface);border:1px solid var(--c-border2);
  border-radius:10px;padding:4px;box-shadow:0 8px 24px var(--c-shadow2);min-width:148px;animation:fadeIn .1s ease}
.ci{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:6px;
  font-size:12px;cursor:pointer;transition:background var(--t);color:var(--c-text)}
.ci:hover{background:var(--c-bg2)}
.ci.d{color:var(--c-red)}.ci.d:hover{background:rgba(192,55,42,.08)}
.ci svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.csep{height:1px;background:var(--c-border);margin:3px 0}

.hid{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(6px)}}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="ll">
    <div class="ll-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2.5" stroke-linecap="round"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round"/></svg>
    </div>
    <div><div class="ll-name">vault</div><div class="ll-sub">e2e · yandex disk</div></div>
  </div>
  <div class="lbl">Ключ шифрования</div>
  <div class="iw">
    <input id="lkey" type="password" placeholder="общий пароль" autocomplete="off" autofocus>
    <button class="eye-btn" onclick="togglePwd()" tabindex="-1">
      <svg id="eyeI" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-linecap="round"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="sbar"><div class="sfill" id="sfill"></div></div>
  <div class="hint">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-linecap="round"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Ключ не покидает устройство — только локальное дешифрование AES-256
  </div>
  <button class="lbtn" id="lbtn" onclick="unlock()">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    Войти
  </button>
  <div class="lerr" id="lerr"></div>
</div>

<!-- APP -->
<div id="app">
  <!-- topbar -->
  <div class="tb">
    <div class="tb-av">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke-linecap="round"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>
    </div>
    <div class="tb-info">
      <div class="tb-name">vault chat</div>
      <div class="tb-st"><div class="sdot" id="sdot"></div><span id="slbl">…</span></div>
    </div>
    <div class="enc-pill">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" stroke-linecap="round"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round"/></svg>
      AES-256
    </div>
    <div class="tb-acts">
      <div class="rf-wrap">
        <button class="ibtn" id="rfbtn" onclick="manualRefresh()" title="Обновить">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.18-6.64" stroke-linecap="round"/></svg>
        </button>
        <div class="nbadge hid" id="nbadge"></div>
      </div>
      <button class="ibtn" onclick="toggleTheme()" title="Тема">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke-linecap="round"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-linecap="round"/></svg>
      </button>
      <button class="ibtn" onclick="doLogout()" title="Выйти">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke-linecap="round"/><line x1="21" y1="12" x2="9" y2="12" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- messages -->
  <div class="msgs" id="msgs">
    <div class="empty" id="emptyEl">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-linecap="round"/></svg>
      <h3>Нет сообщений</h3>
      <p>Переписка зашифрована и хранится в Яндекс Диске</p>
    </div>
  </div>

  <!-- new messages notification -->
  <div class="nmbar" id="nmbar" onclick="scrollBot(true)">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    <span id="nmtxt">новое сообщение</span>
  </div>

  <!-- compose -->
  <div class="cmp">
    <div class="cmp-row">
      <div class="cbox">
        <textarea id="cinp" placeholder="Сообщение…" rows="1"
          oninput="autoH(this)" onkeydown="ckey(event)"></textarea>
        <div class="chint">Enter — отправить · Shift+Enter — перенос строки</div>
      </div>
      <button class="csend" id="sbtn" onclick="doSend()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13" stroke-linecap="round"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="twrap" id="twrap"></div>
<div class="ctx hid" id="ctx">
  <div class="ci" onclick="ctxDo('copy')">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke-linecap="round"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round"/></svg>Копировать
  </div>
  <div class="csep"></div>
  <div class="ci d" onclick="ctxDo('del')">
    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" stroke-linecap="round"/><path d="M19 6l-1 14H6L5 6" stroke-linecap="round"/><path d="M9 6V4h6v2" stroke-linecap="round"/></svg>Удалить с диска
  </div>
</div>

<script>
/* ══ CONFIG ═══════════════════════════════════════════ */
const TOKEN  = "y0__xD4iZiGCBiCoEAgycbshhcwxMLVgQi5WagnH-ls5_oGeADHaV2eWdHGOA";
const FOLDER = "app:/messenger";
const SALT   = "vault-e2e-v1";
const POLL   = 5000;

/* ══ STATE ════════════════════════════════════════════ */
let KEY=null, store={}, known=new Set(), pollTm=null;
let newCnt=0, atBot=true, busy=false, ctxTgt=null, dark=false;

/* ══ CRYPTO ═══════════════════════════════════════════ */
const b64  = arr => btoa(String.fromCharCode(...new Uint8Array(arr)));
const unb  = s   => Uint8Array.from(atob(s), c=>c.charCodeAt(0));

async function dkey(pwd, mode){
  const m = await crypto.subtle.importKey("raw",enc(pwd),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:enc(SALT),iterations:100000,hash:"SHA-256"},
    m,{name:"AES-GCM",length:256},false,[mode]);
}
async function encr(txt,pwd){
  const k=await dkey(pwd,"encrypt"), iv=crypto.getRandomValues(new Uint8Array(12));
  const c=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,enc(txt));
  return {cipher:b64(c),iv:b64(iv)};
}
async function decr(obj,pwd){
  const k=await dkey(pwd,"decrypt");
  const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:unb(obj.iv)},k,unb(obj.cipher));
  return new TextDecoder().decode(p);
}
const enc = s => new TextEncoder().encode(s);

/* ══ API (same endpoints as original) ════════════════ */
async function ya(path,opts={}){
  const r=await fetch("https://cloud-api.yandex.net/v1/disk"+path,
    {...opts,headers:{Authorization:`OAuth ${TOKEN}`,...(opts.headers||{})}});
  if(!r.ok) throw new Error(`${r.status}`);
  if(r.status===204) return null;
  return r.json();
}
const getUpUrl  = fn  => ya(`/resources/upload?path=${FOLDER}/${fn}&overwrite=true`).then(d=>d.href);
const listFiles = ()  => ya(`/resources/files?limit=200`).then(d=>(d.items||[]).filter(f=>f.path?.includes("/messenger/msg_")));
const dlFile    = p   => ya(`/resources/download?path=${encodeURIComponent(p)}`).then(d=>fetch(d.href)).then(r=>r.json());
const delFile   = p   => ya(`/resources?path=${encodeURIComponent(p)}&permanently=true`,{method:"DELETE"});
const ping      = ()  => ya("/");

/* ══ LOCK SCREEN ══════════════════════════════════════ */
document.getElementById("lkey").addEventListener("input",function(){
  const v=this.value, f=document.getElementById("sfill");
  if(!v){f.style.width="0";return;}
  let s=Math.min(100,v.length*7+(/[A-Z]/.test(v)?10:0)+(/\d/.test(v)?10:0)+(/\W/.test(v)?15:0));
  f.style.width=s+"%";
  f.style.background=s<35?"var(--c-red)":s<65?"var(--c-warn)":"var(--c-green)";
});
document.getElementById("lkey").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});

function togglePwd(){
  const i=document.getElementById("lkey");
  i.type=i.type==="password"?"text":"password";
}

async function unlock(){
  const k=document.getElementById("lkey").value.trim();
  const err=document.getElementById("lerr");
  if(!k){err.textContent="Введите ключ шифрования";return;}
  const btn=document.getElementById("lbtn");
  btn.disabled=true; btn.innerHTML='<span style="font-family:var(--mono);font-size:12px">Подключение…</span>';
  err.textContent="";
  try{
    await ping();
    KEY=k;
    document.getElementById("lockScreen").classList.add("hid");
    const app=document.getElementById("app");
    app.classList.add("vis");
    initApp();
  }catch(e){
    err.textContent="Ошибка подключения — проверьте токен";
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Войти';
  }
}

function doLogout(){
  KEY=null; store={}; known.clear(); clearTimeout(pollTm); newCnt=0;
  document.getElementById("app").classList.remove("vis");
  document.getElementById("lockScreen").classList.remove("hid");
  document.getElementById("lkey").value="";
  document.getElementById("sfill").style.width="0";
  document.getElementById("msgs").innerHTML="";
  document.getElementById("msgs").appendChild(mkEmpty());
  document.getElementById("lkey").focus();
}

/* ══ APP INIT ═════════════════════════════════════════ */
function initApp(){
  setSt("spn","загрузка…");
  const msgsEl=document.getElementById("msgs");
  msgsEl.addEventListener("scroll",()=>{
    const{scrollTop,scrollHeight,clientHeight}=msgsEl;
    atBot=scrollHeight-scrollTop-clientHeight<64;
    if(atBot){newCnt=0;hidNM();updBadge();}
  });
  load(true);
  schedPoll();
}
function schedPoll(){
  clearTimeout(pollTm);
  pollTm=setTimeout(()=>load(false).then(schedPoll),POLL);
}

/* ══ LOAD ═════════════════════════════════════════════ */
async function load(init=false){
  if(busy&&!init) return;
  busy=true; setSpin(true);
  try{
    const files=await listFiles();
    files.sort((a,b)=>new Date(a.created)-new Date(b.created));

    if(init&&files.length) showSkel(Math.min(files.length,4));

    // decrypt only new
    const fresh=[];
    for(const f of files){
      if(store[f.path]) continue;
      try{
        const raw=await dlFile(f.path);
        const txt=await decr(raw,KEY);
        store[f.path]={txt,created:f.created,path:f.path,ok:true};
      }catch{
        store[f.path]={txt:null,created:f.created,path:f.path,ok:false};
      }
      fresh.push(f.path);
    }

    // handle remote deletions
    const dPaths=new Set(files.map(f=>f.path));
    for(const p of [...known]){
      if(!dPaths.has(p)){
        known.delete(p); delete store[p];
        const el=document.querySelector(`[data-path="${CSS.escape(p)}"]`);
        if(el){el.style.transition="opacity .2s";el.style.opacity="0";setTimeout(()=>el.remove(),200);}
      }
    }

    if(init) clearSkel();
    const wasBot=atBot;
    let added=0;

    for(const p of fresh){
      if(!known.has(p)){
        appendMsg(store[p]);
        known.add(p);
        if(!init) added++;
      }
    }

    updEmpty();
    if(!init&&added>0){
      if(!wasBot){newCnt+=added;showNM(newCnt);updBadge();}
      else scrollBot(true);
    } else if(init) scrollBot(false);

    setSt("on","на связи");
  }catch(e){
    setSt("err","нет соединения");
  }
  setSpin(false); busy=false;
}

/* ══ RENDER ═══════════════════════════════════════════ */
function appendMsg(msg,prepend=false){
  const c=document.getElementById("msgs");
  const e=document.getElementById("emptyEl");
  if(e) e.remove();

  const ds=fmtDate(msg.created);
  if(!c.querySelector(`.divider[data-d="${ds}"]`)){
    const dv=document.createElement("div");
    dv.className="divider"; dv.dataset.d=ds; dv.textContent=ds;
    if(prepend) c.prepend(dv); else c.appendChild(dv);
  }
  const row=buildRow(msg);
  if(prepend) c.prepend(row); else c.appendChild(row);
}

function buildRow(msg){
  const row=document.createElement("div");
  row.className="brow";
  row.dataset.path=msg.path;

  const p=esc2(msg.path), t=esc2(msg.txt||"");
  let body;
  if(!msg.ok){
    body=`<div class="bub fail">⚠ расшифровка не удалась — неверный ключ</div>`;
  } else {
    body=`<div class="bub in" oncontextmenu="showCtx(event,'${p}','${t}')">
      ${esc(msg.txt)}
      <div class="bub-acts">
        <button class="bact" onclick="copyTxt('${t}')" title="Копировать">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="bact del" onclick="delMsg('${p}')" title="Удалить">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }
  row.innerHTML=`${body}<div class="bmeta"><span>${fmtTime(msg.created)}</span></div>`;
  return row;
}

function showOptimistic(txt,tid){
  const e=document.getElementById("emptyEl"); if(e) e.remove();
  const c=document.getElementById("msgs");
  const row=document.createElement("div");
  row.className="brow me"; row.id="opt"+tid;
  row.innerHTML=`<div class="bub out">${esc(txt)}</div>
    <div class="bmeta"><span>${fmtTime(new Date().toISOString())}</span>
    <span class="sending-lbl">шифрование…</span></div>`;
  c.appendChild(row); scrollBot(true);
}
function confirmOpt(tid){
  const el=document.getElementById("opt"+tid);
  if(!el) return;
  const sl=el.querySelector(".sending-lbl"); if(sl) sl.remove();
  const meta=el.querySelector(".bmeta");
  if(meta){const chk=document.createElement("span");chk.className="chk";
    chk.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    meta.appendChild(chk);}
}
function removeOpt(tid){const el=document.getElementById("opt"+tid);if(el)el.remove();}

/* ══ SEND ═════════════════════════════════════════════ */
async function doSend(){
  const inp=document.getElementById("cinp");
  const txt=inp.value.trim();
  if(!txt||!KEY) return;
  inp.value=""; autoH(inp);
  const btn=document.getElementById("sbtn");
  btn.disabled=true; btn.classList.add("sending");
  const tid=Date.now();
  showOptimistic(txt,tid);
  try{
    const data=await encr(txt,KEY);
    const fn=`msg_${Date.now()}.json`;
    const up=await getUpUrl(fn);
    await fetch(up,{method:"PUT",body:JSON.stringify(data)});
    confirmOpt(tid);
    clearTimeout(pollTm);
    setTimeout(()=>load(false).then(schedPoll),700);
  }catch(e){
    removeOpt(tid);
    toast("Ошибка отправки: "+e.message,true);
    inp.value=txt; autoH(inp);
  }
  btn.disabled=false; btn.classList.remove("sending"); inp.focus();
}

/* ══ DELETE ═══════════════════════════════════════════ */
async function delMsg(path){
  const row=document.querySelector(`[data-path="${CSS.escape(path)}"]`);
  if(row){row.style.opacity=".4";row.style.pointerEvents="none";}
  try{
    await delFile(path);
    delete store[path]; known.delete(path);
    if(row){row.style.transition="all .2s";row.style.opacity="0";
      row.style.maxHeight="0";setTimeout(()=>row.remove(),220);}
    updEmpty(); toast("Удалено");
  }catch{
    if(row){row.style.opacity="1";row.style.pointerEvents="";}
    toast("Ошибка удаления",true);
  }
}

/* ══ CONTEXT MENU ═════════════════════════════════════ */
function showCtx(e,path,txt){
  e.preventDefault(); ctxTgt={path,txt};
  const m=document.getElementById("ctx"); m.classList.remove("hid");
  m.style.left=Math.min(e.clientX,window.innerWidth-160)+"px";
  m.style.top=Math.min(e.clientY,window.innerHeight-90)+"px";
}
function ctxDo(a){
  if(!ctxTgt) return;
  if(a==="copy") copyTxt(ctxTgt.txt);
  if(a==="del")  delMsg(ctxTgt.path);
  ctxTgt=null; document.getElementById("ctx").classList.add("hid");
}
document.addEventListener("click",()=>document.getElementById("ctx").classList.add("hid"));

/* ══ MANUAL REFRESH ═══════════════════════════════════ */
function manualRefresh(){
  clearTimeout(pollTm); newCnt=0; hidNM(); updBadge();
  load(false).then(schedPoll);
}

/* ══ UI HELPERS ═══════════════════════════════════════ */
function setSt(type,lbl){
  const d=document.getElementById("sdot"), l=document.getElementById("slbl");
  l.textContent=lbl;
  d.className="sdot";
  if(type==="on") d.classList.add("on");
  else if(type==="err") d.classList.add("err");
  else if(type==="spn") d.classList.add("spn");
}
function setSpin(on){
  const s=document.getElementById("rfbtn").querySelector("svg");
  s.style.animation=on?"spin .7s linear infinite":"";
}
function showSkel(n){
  const c=document.getElementById("msgs"); c.innerHTML="";
  const sz=["s","m","l","m","s"];
  for(let i=0;i<n;i++){
    const row=document.createElement("div");
    row.className="brow skel-row";
    const s=document.createElement("div");
    s.className="skel "+sz[i%sz.length]+(i%2===0?" me":"");
    row.appendChild(s); c.appendChild(row);
  }
}
function clearSkel(){
  document.querySelectorAll(".skel-row").forEach(el=>el.remove());
}
function mkEmpty(){
  const d=document.createElement("div");
  d.className="empty"; d.id="emptyEl";
  d.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h3>Нет сообщений</h3><p>Переписка зашифрована и хранится в Яндекс Диске</p>`;
  return d;
}
function updEmpty(){
  const c=document.getElementById("msgs");
  const has=c.querySelector(".brow:not(.skel-row)")!==null;
  const ex=document.getElementById("emptyEl");
  if(!has&&!ex) c.appendChild(mkEmpty());
  else if(has&&ex) ex.remove();
}
function scrollBot(smooth=true){
  const c=document.getElementById("msgs");
  c.scrollTo({top:c.scrollHeight,behavior:smooth?"smooth":"instant"});
  atBot=true; newCnt=0; hidNM(); updBadge();
}
function showNM(n){
  document.getElementById("nmtxt").textContent=n===1?"1 новое сообщение":`${n} новых`;
  document.getElementById("nmbar").classList.add("show");
}
function hidNM(){ document.getElementById("nmbar").classList.remove("show"); }
function updBadge(){
  const b=document.getElementById("nbadge");
  if(newCnt>0){b.textContent=newCnt>9?"9+":newCnt;b.classList.remove("hid");}
  else b.classList.add("hid");
}
function autoH(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,115)+"px";}
function ckey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}}
function copyTxt(t){
  navigator.clipboard.writeText(t).then(()=>toast("Скопировано")).catch(()=>toast("Ошибка",true));
}
function toast(msg,err=false){
  const w=document.getElementById("twrap");
  const el=document.createElement("div");
  el.className="tt"+(err?" err":""); el.textContent=msg; w.appendChild(el);
  setTimeout(()=>{el.classList.add("out");setTimeout(()=>el.remove(),200);},2200);
}
function toggleTheme(){
  dark=!dark;
  document.documentElement.toggleAttribute("data-dark",dark);
  localStorage.setItem("vd",dark?"1":"");
}
if(localStorage.getItem("vd")){dark=true;document.documentElement.setAttribute("data-dark","");}

function fmtTime(iso){return new Date(iso).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(iso){
  const d=new Date(iso),t=new Date();
  if(d.toDateString()===t.toDateString()) return "Сегодня";
  const y=new Date(t); y.setDate(t.getDate()-1);
  if(d.toDateString()===y.toDateString()) return "Вчера";
  return d.toLocaleDateString("ru-RU",{day:"numeric",month:"long"});
}
function esc(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}
function esc2(s){ return (s||"").replace(/'/g,"\\'").replace(/\n/g,"\\n"); }
